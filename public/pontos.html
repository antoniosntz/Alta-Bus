<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AltaBus - Selecionar Ponto</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body class="corpo-selecao">

    <div class="wrapper-centralizado">
        
        <div class="escolha-container">
            <a href="index.html" class="btn-voltar-flutuante">
                <i class='bx bx-chevron-left'></i> Voltar
            </a>

            <div class="logo-area">
                <h2>AltaBus</h2>
            </div>

            <h3>Escolha seu ponto</h3>
            <p>Selecione onde você vai pegar o ônibus para acompanhar a chegada em tempo real.</p>

            <div class="input-group">
                <select id="select-ponto">
                    <option value="" disabled selected>Clique para selecionar...</option>
                    <option value="-20.521139,-40.985417">Ponto 1 - Posto Castelinho</option>
                    <option value="-20.596750,-41.023194">Ponto 2 - Posto Beira Rio</option>
                    <option value="-20.604611,-41.028278">Ponto 3 - Campo de fruteiras</option>
                    <option value="-20.618194,-41.024694">Ponto 4 - Departamento</option>
                    <option value="-20.627472,-41.016222">Ponto 5 - Rancho da Lagoa</option>
                    <option value="-20.636999,-41.014028">Ponto 6 - Ponte do AYD</option>
                    <option value="-20.655694,-41.019333">Ponto 7 - Supermercado da Vila Esperança</option>
                    <option value="-20.673694,-41.010972">Ponto 8 - Rodoviária de Vargem Alta</option>
                    <option value="-20.706889,-41.027472">Ponto 9 - Oficina Jacigua</option>
                    <option value="-20.705000,-41.019889">Ponto 10 - Casarão</option>
                    <option value="-20.705500,-41.017694">Ponto 11 - Bar do Machados</option>
                    <option value="-20.710750,-41.016222">Ponto 12 - Bar da Linha</option>
                    <option value="-20.721583,-41.010861">Ponto 14 - CEET Giuseppe Altoe</option>
                </select>
            </div>

            <button class="btn-continuar" onclick="confirmarPonto()">
                Continuar <i class='bx bx-right-arrow-alt'></i>
            </button>
        </div>

    </div>

    <script>
        function confirmarPonto() {
            const select = document.getElementById('select-ponto');
            const coordenadas = select.value;

            if (!coordenadas) {
                alert("Por favor, selecione um ponto de parada.");
                return;
            }

            localStorage.setItem("pontoCoordenadas", coordenadas);
            window.location.href = "cliente.html";
        }
    </script>
</body>
</html>
