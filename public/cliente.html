<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AltaBus - Rastreamento</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

    <div id="map"></div>

    <div class="iphone-container">
        
        <button class="btn-voltar-topo" onclick="voltar()">
            <i class='bx bx-chevron-left'></i> Voltar
        </button>

        <div class="logo-area">
            <h2>AltaBus</h2>
        </div>

        <div class="ponto-card">
            <p>Seu Ponto de Embarque</p>
            <h3 id="ponto" class="ponto-nome">Carregando...</h3>
        </div>

        <div class="content-info">
            <div class="info-box">
                <i class='bx bx-move-horizontal'></i>
                <p>Distância</p>
                <h3 id="distancia">-- km</h3>
            </div>

            <div class="info-box">
                <i class='bx bx-time-five'></i>
                <p>Tempo</p>
                <h3 id="tempo">-- min</h3>
            </div>

            <div class="info-box status-box">
                <i class='bx bx-broadcast'></i>
                <h3 id="status">Calculando...</h3>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="js/api.js"></script>

    <script src="js/cliente.js"></script>

   
    
</body>
</html>
