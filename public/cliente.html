<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AltaBus - Rastreamento</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

    <div id="map"></div>

    <div class="iphone-container">
        
        <button class="btn-voltar-topo" onclick="voltar()">
            <i class='bx bx-chevron-left'></i> Voltar
        </button>

        <div class="logo-area">
            <h2>AltaBus</h2>
        </div>

        <div class="ponto-card">
            <p>Seu Ponto de Embarque</p>
            <h3 id="ponto" class="ponto-nome">Carregando...</h3>
        </div>

        <div class="content-info">
            <div class="info-box">
                <i class='bx bx-move-horizontal'></i>
                <p>Distância</p>
                <h3 id="distancia">-- km</h3>
            </div>

            <div class="info-box">
                <i class='bx bx-time-five'></i>
                <p>Tempo</p>
                <h3 id="tempo">-- min</h3>
            </div>

            <div class="info-box status-box">
                <i class='bx bx-broadcast'></i>
                <h3 id="status">Calculando...</h3>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const pontos = [
            {nome:"Ponto 1 - Posto Castelinho", lat:-20.521139, lng:-40.985417},
            {nome:"Ponto 2 - Posto Beira Rio", lat:-20.596750, lng:-41.023194},
            {nome:"Ponto 3 - Campo de fruteiras", lat:-20.604611, lng:-41.028278},
            {nome:"Ponto 4 - Departamento", lat:-20.618194, lng:-41.024694},
            {nome:"Ponto 5 - Rancho da Lagoa", lat:-20.627472, lng:-41.016222},
            {nome:"Ponto 6 - Ponte do AYD", lat:-20.636999, lng:-41.014028},
            {nome:"Ponto 7 - Supermercado da Vila Esperança", lat:-20.655694, lng:-41.019333},
            {nome:"Ponto 8 - Rodoviária de Vargem Alta", lat:-20.673694, lng:-41.010972},
            {nome:"Ponto 9 - Oficina Jacigua", lat:-20.706889, lng:-41.027472},
            {nome:"Ponto 10 - Casarão", lat:-20.705000, lng:-41.019889},
            {nome:"Ponto 11 - Bar do Machados", lat:-20.705500, lng:-41.017694},
            {nome:"Ponto 12 - Bar da Linha", lat:-20.710750, lng:-41.016222},
            {nome:"Ponto 14 - CEET Giuseppe Altoe", lat:-20.721583, lng:-41.010861}
        ];

        // Carregar ponto salvo
        const coordenadasSalvas = localStorage.getItem("pontoCoordenadas");
        let pontoSelecionadoUsuario = null;

        if (coordenadasSalvas) {
            const [latS, lngS] = coordenadasSalvas.split(',').map(Number);
            pontoSelecionadoUsuario = pontos.find(p => p.lat === latS && p.lng === lngS);
            if(pontoSelecionadoUsuario) {
                document.getElementById("ponto").innerText = pontoSelecionadoUsuario.nome;
            }
        }

        // Inicializar Mapa
        var map = L.map('map', { zoomControl: false }).setView([-20.721583, -41.010861], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        L.control.zoom({ position: 'topright' }).addTo(map);

        // Ícone dos pontos (bolinhas azuis)
        var busStopIcon = L.divIcon({
            className: 'ponto-icon',
            iconSize: [10, 10],
            iconAnchor: [5, 5]
        });

        // Adicionar todos os pontos ao mapa
        pontos.forEach(p => {
            L.marker([p.lat, p.lng], { icon: busStopIcon }).addTo(map).bindPopup(p.nome);
        });

        // Ícone do Ônibus Vermelho
        var redBusIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448339.png',
            iconSize: [45, 45],
            iconAnchor: [22, 45],
            popupAnchor: [0, -45]
        });

        var markerOnibus = L.marker([-20.721583, -41.010861], { icon: redBusIcon })
                            .addTo(map)
                            .bindPopup("Ônibus AltaBus");
        
        // Destaque para o ponto do usuário
        var markerPontoUsuario = L.circleMarker([0,0], {
            radius: 12,
            color: '#38bdf8',
            fillColor: '#38bdf8',
            fillOpacity: 0.4
        }).addTo(map);

        // Se o usuário tiver um ponto salvo, move o círculo azul para lá
        if (pontoSelecionadoUsuario) {
            markerPontoUsuario.setLatLng([pontoSelecionadoUsuario.lat, pontoSelecionadoUsuario.lng]);
        }

        async function atualizarDados() {
            // Se o usuário não tiver selecionado um ponto ainda, não faz a requisição
            if (!pontoSelecionadoUsuario) {
                document.getElementById("status").innerText = "Selecione um ponto";
                return;
            }

            try {
                // Faz a requisição para a rota unificada que corrigimos no servidor
                const resposta = await fetch(`/tempo?ponto=${encodeURIComponent(pontoSelecionadoUsuario.nome)}`);
                const dados = await resposta.json();

                if (dados.success) {
                    // 1. Atualiza distância e tempo normalmente
                    document.getElementById("distancia").innerText = dados.distancia_km + " km";
                    document.getElementById("tempo").innerText = dados.tempo_min + " min";

                    // 2. ATUALIZAÇÃO DA POSIÇÃO DO ÔNIBUS NO MAPA
                    if (dados.onibus && dados.onibus.lat && dados.onibus.lng) {
                        markerOnibus.setLatLng([dados.onibus.lat, dados.onibus.lng]);
                    }

                    // 3. BUSCA O STATUS ENVIADO PELO MOTORISTA E JOGA NO CARD
                    const elementoStatus = document.getElementById("status");
                    
                    if (elementoStatus) {
                        // Plano B: Se por algum motivo o servidor esquecer de mandar o texto, vira 'A caminho...'
                        const textoFinal = dados.status_texto || 'A caminho...';
                        elementoStatus.innerText = textoFinal;
                        
                        // Muda a cor do texto do aluno dependendo do problema!
                        if (textoFinal.includes('Quebrou')) {
                            elementoStatus.style.color = '#ef4444'; // Vermelho
                        } else if (textoFinal.includes('Trânsito') || textoFinal.includes('Desviada')) {
                            elementoStatus.style.color = '#eab308'; // Amarelo
                        } else {
                            elementoStatus.style.color = '#ffffff'; // Branco padrão
                        }
                    }
                }

            } catch (e) {
                console.log("Erro na atualização dos dados do aluno:", e);
                document.getElementById("status").innerText = "Erro de conexão";
            }
        }

        function voltar() { window.location.href = "pontos.html"; }

        // Ajuste de tamanho do mapa
        setTimeout(() => { map.invalidateSize(); }, 500);

        // Atualiza a cada 5 segundos
        setInterval(atualizarDados, 5000);
        atualizarDados();
    </script>
</body>
</html>
