<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AltaBus - Login</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="stylelogin.css">
</head>
<body>
    <div class="login-container">
        <img src="ALTA_BUS__3_-removebg-preview (2).png" alt="Ônibus" class="onibus-img">
        
        <h2>Login</h2>
        <p class="subtitle">entre com sua conta</p>
        
        <form class="login-form">
            <div class="input-group">
                <label for="email">E-mail</label>
                <div class="input-with-icon">
                    <i class='bx bx-user'></i>
                    <input type="email" id="email" placeholder="exemplo@email.com">
                </div>
            </div>
            
            <div class="input-group">
                <label for="senha">Senha</label>
                <div class="input-with-icon">
                    <i class='bx bx-lock-alt'></i>
                    <input type="password" id="senha" placeholder="........">
                </div>
            </div>
            
         
            <button type="button" class="btn-entrar" onclick="validarLogin()">Entrar</button>
            <button type="button" class="btn-criar" onclick="irParaCadastro()">Criar nova conta</button>
        </form>
    </div>

   <script src="script.js"></script>
</body>
</html>
